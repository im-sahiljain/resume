name: Compile and upload résumé PDF
on:
    workflow_dispatch:
    push:
        branches:
            - "main"
        paths:
            - "resume.tex"
            - "index.html"
            - ".github/workflows/**"
    pull_request:
        branches:
            - "main"
        paths:
            - "resume.tex"
            - "index.html"
            - "link-generator.html"
            - ".github/workflows/**"

jobs:
    build_latex:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v2
              with:
                  persist-credentials: false

            - name: Inject Secrets
              env:
                PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
              run: |
                if [ ! -z "$PHONE_NUMBER" ]; then
                  sed -i "s|PHONE_NUMBER_PLACEHOLDER|$PHONE_NUMBER|g" resume.tex
                else
                  sed -i "/PHONE_NUMBER_PLACEHOLDER/d" resume.tex
                fi

            - name: Compile LaTeX document
              uses: xu-cheng/latex-action@v2
              with:
                  root_file: resume.tex

            - name: Post Processing
              run: |
                  mkdir build 
                  cp *.pdf build/ 
                  cp index.html build/
                  cp ./generators/link-generator.html build/
                  cp preview.png build/
                  if [ -f CNAME ]; then cp CNAME build/; fi
                  
            - name: Git add
              run: git add resume.pdf
              
            - name: Deploy to GitHub Pages
              uses: JamesIves/github-pages-deploy-action@4.1.4
              with:
                  BRANCH: gh-pages
                  FOLDER: build
                  CLEAN: true
